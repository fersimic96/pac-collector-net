name: build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: restore
        run: dotnet restore PacCollector.slnx
      - name: build
        run: dotnet build PacCollector.slnx --no-restore -c Release
      - name: test
        run: dotnet test PacCollector.slnx --no-build -c Release --logger "console;verbosity=normal"
